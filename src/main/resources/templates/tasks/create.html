<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nowe zadanie</title>
</head>
<body>

<h1>Nowe zadanie</h1>

<form th:action="@{/tasks}" th:object="${task}" method="post">

    <label>Tytuł:</label><br>
    <input type="text" th:field="*{title}" /><br><br>

    <label>Opis:</label><br>
    <textarea th:field="*{description}"></textarea><br><br>

    <label>Termin (yyyy-MM-ddTHH:mm:ss):</label><br>
    <input type="text" th:field="*{dueDate}" /><br><br>

    <label>Status:</label><br>
    <select th:field="*{status}">
        <option value="TODO">TODO</option>
        <option value="IN_PROGRESS">IN_PROGRESS</option>
        <option value="DONE">DONE</option>
    </select><br><br>

    <button type="submit">Zapisz</button>

</form>

<br>
<a href="/tasks">Powrót</a>

</body>
</html>
