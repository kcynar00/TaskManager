<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Szczegóły</title>
</head>
<body>

<h1>Szczegóły zadania</h1>

<p><b>ID:</b> <span th:text="${task.id}"></span></p>
<p><b>Tytuł:</b> <span th:text="${task.title}"></span></p>
<p><b>Opis:</b> <span th:text="${task.description}"></span></p>
<p><b>Status:</b> <span th:text="${task.status}"></span></p>
<p><b>Termin:</b> <span th:text="${task.dueDate}"></span></p>

<br>
<a href="/tasks">Powrót</a>

</body>
</html>
